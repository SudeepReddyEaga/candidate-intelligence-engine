<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Intelligence Engine</title>
    <meta name="description" content="AI-powered candidate data extraction and transformation.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>
    
    <div class="container">
        <header class="app-header">

            <div class="logo">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <h1>Candidate Intelligence Engine</h1>
            </div>
            <p>Intelligent extraction, validation, and projection of candidate profiles.</p>
        </header>
        
        <main class="app-main">
            <section class="upload-section glass-panel">
                <h2>Upload Sources</h2>
                <form id="transform-form">
                    <div class="file-inputs-grid">
                        <div class="file-drop-area" data-input-id="resume">
                            <i class="fa-regular fa-file-pdf"></i>
                            <span>Resume (PDF)</span>
                            <input type="file" id="resume" name="resume" accept=".pdf">
                        </div>
                        <div class="file-drop-area" data-input-id="csv">
                            <i class="fa-solid fa-file-csv"></i>
                            <span>Recruiter CSV</span>
                            <input type="file" id="csv" name="csv" accept=".csv">
                        </div>
                        <div class="file-drop-area" data-input-id="ats_json">
                            <i class="fa-brands fa-node-js"></i>
                            <span>ATS JSON</span>
                            <input type="file" id="ats_json" name="ats_json" accept=".json">
                        </div>
                        <div class="file-drop-area" data-input-id="github_json">
                            <i class="fa-brands fa-github"></i>
                            <span>GitHub JSON</span>
                            <input type="file" id="github_json" name="github_json" accept=".json">
                        </div>
                        <div class="file-drop-area" data-input-id="notes">
                            <i class="fa-regular fa-note-sticky"></i>
                            <span>Recruiter Notes</span>
                            <input type="file" id="notes" name="notes" accept=".txt">
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button type="submit" id="submit-btn" class="glow-btn">
                            <span>Transform Data</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                        <button type="button" id="reset-btn" class="outline-btn">
                            <i class="fa-solid fa-rotate-left"></i>
                            <span>Reset</span>
                        </button>
                    </div>
                </form>
            </section>
            
            <section id="results-section" class="results-section hidden">
                <div class="results-header">
                    <h2>Transformation Results</h2>
                    <div class="view-toggle" style="background: rgba(255,255,255,0.05); padding: 5px; border-radius: 8px; display: inline-flex; gap: 5px;">
                        <button type="button" id="toggle-interactive" class="toggle-btn active" style="background: var(--primary-color); border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Interactive</button>
                        <button type="button" id="toggle-textual" class="toggle-btn" style="background: transparent; border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Textual (JSON)</button>
                    </div>
                    <div class="metrics" id="metrics-container"></div>
                </div>
                
                <div id="candidates-container" class="candidates-container">
                    <!-- Candidate cards will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner-container">
            <div class="spinner"></div>
            <p>Extracting data using Transformer pipeline...</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
